services:
  # PostgreSQL Database
  postgres:
    image: postgres:16
    container_name: delphi_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      # 127.0.0.1 = localhost only (not exposed to internet)
      # For production: remove this ports section entirely
      - "127.0.0.1:${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Automatically run schema on first startup
      - ./DelphiAIApp/Models/db/schemas.sql:/docker-entrypoint-initdb.d/01_schemas.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - delphi_network

  # pgAdmin - Web-based PostgreSQL Admin Tool
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: delphi_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      # localhost only - not exposed to internet
      # For production: remove pgAdmin or put behind auth proxy
      - "127.0.0.1:5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - delphi_network

networks:
  delphi_network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data:
